name: Deploy Omni Flow

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

jobs:
  # Job 1: Testes
  test:
    runs-on: ubuntu-latest
    name: Testes Unitários

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Rodar testes
        run: npm run test

      - name: Verificar TypeScript
        run: npm run check

  # Job 2: Lint e Formatação
  lint:
    runs-on: ubuntu-latest
    name: Lint e Formatação

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Verificar formatação
        run: npm run format -- --check

  # Job 3: Build
  build:
    runs-on: ubuntu-latest
    name: Build da Aplicação
    needs: [test, lint]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/

  # Job 4: Deploy Edge Functions (Apenas em main)
  deploy-functions:
    runs-on: ubuntu-latest
    name: Deploy Edge Functions
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar Supabase CLI
        run: npm install -g supabase

      - name: Deploy webhook-receiver
        run: |
          supabase functions deploy webhook-receiver \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} \
            --authorization Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Deploy send-whatsapp
        run: |
          supabase functions deploy send-whatsapp \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} \
            --authorization Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Deploy ai-proxy
        run: |
          supabase functions deploy ai-proxy \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} \
            --authorization Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Deploy transcribe-audio
        run: |
          supabase functions deploy transcribe-audio \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} \
            --authorization Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Deploy upload-media
        run: |
          supabase functions deploy upload-media \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} \
            --authorization Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Deploy notify-owner
        run: |
          supabase functions deploy notify-owner \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} \
            --authorization Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Notificar sucesso
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Edge Functions deployadas com sucesso!'
            })

  # Job 5: Deploy Database Migrations (Apenas em main)
  deploy-migrations:
    runs-on: ubuntu-latest
    name: Deploy Database Migrations
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar Supabase CLI
        run: npm install -g supabase

      - name: Aplicar migrations
        run: |
          supabase db push \
            --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} \
            --password ${{ secrets.SUPABASE_DB_PASSWORD }}

  # Job 6: Deploy Frontend (Apenas em main)
  deploy-frontend:
    runs-on: ubuntu-latest
    name: Deploy Frontend
    needs: [build, deploy-functions, deploy-migrations]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Deploy para Vercel
        uses: vercel/action@v5
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          production: true

      - name: Notificar deploy
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Deploy para produção concluído com sucesso!'
            })

  # Job 7: Smoke Tests (Após deploy)
  smoke-tests:
    runs-on: ubuntu-latest
    name: Smoke Tests
    needs: deploy-frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependências
        run: npm ci

      - name: Rodar smoke tests
        run: npm run test:smoke
        env:
          APP_URL: ${{ secrets.PRODUCTION_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Notificar falha
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Smoke tests falharam! Verifique a produção.'
            })

  # Job 8: Notificação Final
  notify:
    runs-on: ubuntu-latest
    name: Notificação Final
    needs: [test, lint, build, deploy-functions, deploy-migrations, deploy-frontend, smoke-tests]
    if: always()

    steps:
      - name: Determinar status
        id: status
        run: |
          if [ "${{ needs.test.result }}" = "failure" ] || \
             [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.build.result }}" = "failure" ] || \
             [ "${{ needs.deploy-functions.result }}" = "failure" ] || \
             [ "${{ needs.deploy-migrations.result }}" = "failure" ] || \
             [ "${{ needs.deploy-frontend.result }}" = "failure" ] || \
             [ "${{ needs.smoke-tests.result }}" = "failure" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Notificar no Slack (Sucesso)
        if: steps.status.outputs.status == 'success'
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Omni Flow Deploy Concluído",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ Omni Flow Deploy Concluído*\n\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\nAutor: ${{ github.actor }}"
                  }
                }
              ]
            }

      - name: Notificar no Slack (Falha)
        if: steps.status.outputs.status == 'failure'
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ Omni Flow Deploy Falhou",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Omni Flow Deploy Falhou*\n\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\nAutor: ${{ github.actor }}\n\nVerifique os logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
