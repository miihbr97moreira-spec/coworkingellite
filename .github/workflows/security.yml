name: Segurança e Performance

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: "0 0 * * 0" # Toda semana

jobs:
  # Job 1: Verificação de Dependências
  dependencies:
    runs-on: ubuntu-latest
    name: Verificação de Dependências

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Verificar vulnerabilidades
        run: npm audit --audit-level=moderate

      - name: Verificar pacotes desatualizados
        run: npm outdated || true

  # Job 2: SAST (Static Application Security Testing)
  sast:
    runs-on: ubuntu-latest
    name: Análise Estática de Segurança

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Executar ESLint
        run: npm run lint || true

      - name: Verificar secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # Job 3: Testes de Performance
  performance:
    runs-on: ubuntu-latest
    name: Testes de Performance

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build

      - name: Analisar tamanho do bundle
        run: |
          echo "📊 Tamanho do bundle:"
          du -sh dist/

      - name: Verificar performance
        run: npm run test:performance || true

  # Job 4: Verificação de Código Duplicado
  duplication:
    runs-on: ubuntu-latest
    name: Verificação de Duplicação

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar jscpd
        run: npm install -g jscpd

      - name: Verificar código duplicado
        run: jscpd --min-tokens 50 --min-lines 5 src/ || true

  # Job 5: Verificação de Cobertura de Testes
  coverage:
    runs-on: ubuntu-latest
    name: Cobertura de Testes

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Rodar testes com cobertura
        run: npm run test -- --coverage

      - name: Upload cobertura
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

  # Job 6: Verificação de Segurança do Supabase
  supabase-security:
    runs-on: ubuntu-latest
    name: Segurança do Supabase

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar RLS
        run: |
          echo "✅ Verificando Row Level Security..."
          grep -r "ENABLE ROW LEVEL SECURITY" supabase/migrations/ || echo "⚠️ Nenhuma RLS encontrada"

      - name: Verificar índices
        run: |
          echo "✅ Verificando índices de performance..."
          grep -r "CREATE INDEX" supabase/migrations/ || echo "⚠️ Nenhum índice encontrado"

  # Job 7: Verificação de Conformidade
  compliance:
    runs-on: ubuntu-latest
    name: Verificação de Conformidade

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar licenças
        run: npm run check:licenses || true

      - name: Verificar CHANGELOG
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "⚠️ CHANGELOG.md não encontrado"
          fi

      - name: Verificar README
        run: |
          if [ ! -f README.md ]; then
            echo "⚠️ README.md não encontrado"
          fi

  # Job 8: Notificação de Segurança
  notify-security:
    runs-on: ubuntu-latest
    name: Notificação de Segurança
    needs: [dependencies, sast, performance, duplication, coverage, supabase-security, compliance]
    if: always()

    steps:
      - name: Determinar status
        id: status
        run: |
          if [ "${{ needs.dependencies.result }}" = "failure" ] || \
             [ "${{ needs.sast.result }}" = "failure" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Notificar no Slack
        if: steps.status.outputs.status == 'failure'
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "⚠️ Problemas de Segurança Detectados",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*⚠️ Problemas de Segurança Detectados*\n\nVerifique os logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
